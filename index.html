<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Spec Viewer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f5;--surface:#fff;--surface2:#f2f1ed;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#a09e98;
  --bd:#e4e2da;--bd2:#d0cec6;
  --amber:#7a4a00;--amber-bg:#FEF3DC;--amber-bd:#E8B84B;
  --blue:#0f4f8a;--blue-bg:#EAF3FC;--blue-bd:#7BB8EE;
  --purple:#3d2d9e;--purple-bg:#EEEDFE;--purple-bd:#9891E0;
  --green:#0b6e3a;--green-bg:#E3F5EC;--green-bd:#5DC991;
  --coral:#7a2800;--coral-bg:#FFF0EB;--coral-bd:#F0A07A;
}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;overflow:hidden;height:100vh}

/* ── Welcome Screen ─────────────────────────────────────────────── */
#welcome{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
#welcome.hidden{display:none}
.wc-logo{font-size:13px;font-weight:500;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:36px}
.wc-logo span{color:var(--text);font-weight:600}
.drop-zone{width:460px;border:2px dashed var(--bd2);border-radius:14px;padding:44px 36px;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:all .18s;background:var(--surface)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--purple-bd);background:var(--purple-bg)}
.drop-icon{font-size:32px;opacity:.35}
.drop-title{font-size:15px;font-weight:500;color:var(--text)}
.drop-sub{font-size:12px;color:var(--text3);text-align:center;line-height:1.6}
.drop-btn{margin-top:4px;padding:8px 22px;border-radius:6px;border:1px solid var(--bd2);background:var(--surface);font-size:12px;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .12s}
.drop-btn:hover{border-color:var(--text2);color:var(--text);background:var(--surface2)}
.wc-divider{display:flex;align-items:center;gap:10px;width:460px;margin:20px 0 0}
.wc-divider::before,.wc-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.wc-divider span{font-size:11px;color:var(--text3)}
.url-row{display:flex;gap:8px;width:460px;margin-top:16px}
.url-input{flex:1;padding:8px 12px;border:1px solid var(--bd2);border-radius:6px;font-size:12px;font-family:'DM Mono',monospace;background:var(--surface);color:var(--text);outline:none;transition:border-color .12s}
.url-input:focus{border-color:var(--purple-bd)}
.url-input::placeholder{color:var(--text3)}
.url-btn{padding:8px 16px;border-radius:6px;border:none;background:var(--text);color:#fff;font-size:12px;font-family:inherit;cursor:pointer;transition:opacity .12s;white-space:nowrap}
.url-btn:hover{opacity:.75}
.wc-examples{margin-top:12px;font-size:11px;color:var(--text3);width:460px;line-height:1.8}
.wc-err{margin-top:10px;font-size:11px;color:var(--coral);width:460px;min-height:16px}

/* ── Main Viewer Layout ──────────────────────────────────────────── */
.layout{display:grid;grid-template-columns:190px 1fr;height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-name{font-size:13px;font-weight:500;word-break:keep-all}
.sb-updated{font-size:10px;color:var(--text3);margin-top:6px;font-family:'DM Mono',monospace}
.sb-filters{padding:.6rem .75rem;border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0}
.fchip{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--bd2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s}
.fchip:hover{border-color:var(--text2);color:var(--text)}
.fchip.on{background:var(--text);color:#fff;border-color:var(--text)}
.sb-nav{flex:1;overflow-y:auto;padding:.5rem 0}
.sb-sec{display:flex;align-items:center;gap:7px;padding:.35rem 1.1rem;font-size:12px;color:var(--text2);cursor:pointer;transition:background .12s}
.sb-sec:hover{background:var(--surface2);color:var(--text)}
.sb-sec.hl{color:var(--coral);font-weight:500}
.sb-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.d-ch{background:#D85A30}.d-g{background:#d0cec6}.d-log{background:#7F77DD}.d-empty{background:transparent;border:1px solid #d0cec6}
.sb-sec-empty{opacity:.55}
.sb-cl{display:flex;align-items:center;gap:7px;padding:.5rem 1.1rem;font-size:12px;color:var(--text2);cursor:pointer;transition:background .12s;border-top:1px solid var(--bd);margin-top:4px}
.sb-cl:hover{background:var(--surface2)}
.sb-action{display:flex;align-items:center;gap:7px;padding:.4rem 1.1rem;font-size:12px;color:var(--text2);cursor:pointer;transition:background .12s;border-bottom:1px solid var(--bd)}
.sb-action:hover{background:var(--surface2);color:var(--text)}
.content-area{display:grid;grid-template-columns:1fr 0 0;transition:grid-template-columns .25s ease;overflow:hidden;height:100%}
.content-area.panel-open{grid-template-columns:1fr 4px var(--panel-w,400px)}
.resizer{background:transparent;cursor:col-resize;position:relative;transition:background .15s;flex-shrink:0}
.resizer::after{content:'';position:absolute;top:0;left:-4px;right:-4px;bottom:0}
.resizer:hover,.resizer.dragging{background:var(--purple-bd)}
.list-col{overflow-y:auto;padding:1.5rem 2rem;border-right:1px solid transparent;transition:border-color .25s}
.content-area.panel-open .list-col{border-right-color:var(--bd)}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--bd);border-radius:8px;padding:10px 14px}
.sv{font-size:22px;font-weight:500;line-height:1;font-family:'DM Mono',monospace}
.sl{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.sv-ch{color:#D85A30}
.sec-block{margin-bottom:1rem}
.sec-hd{display:flex;align-items:center;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sec-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.item-row{background:var(--surface);border:1px solid var(--bd);border-radius:7px;margin-bottom:5px;overflow:hidden;transition:border-color .15s;cursor:pointer}
.item-row:hover .item-name-cell{background:var(--surface2)}
.item-row.active{border-color:#7F77DD}
.item-row.active .item-name-cell{background:#EEEDFE30}
.item-main{display:grid;grid-template-columns:1fr auto auto;align-items:stretch}
.item-name-cell{padding:10px 13px;transition:background .12s}
.item-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.item-dot-ch{background:#D85A30}
.item-dot-g{background:#d0cec6}
.item-order{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);font-weight:400;flex-shrink:0;width:44px}
.item-sub{font-size:11px;color:var(--text3);margin-top:2px;padding-left:57px}
.item-id-cell{padding:8px 10px;border-left:1px solid var(--bd);display:flex;align-items:center;gap:5px}
.item-id-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);padding:2px 6px;border-radius:3px;background:var(--surface2);border:1px solid var(--bd);white-space:nowrap}
.item-ref-icon{display:inline-flex;align-items:center;justify-content:center;gap:2px;padding:0 5px;height:20px;min-width:20px;border-radius:4px;background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue);cursor:default;flex-shrink:0;font-size:9px;font-weight:600}
.item-ref-icon:hover{background:var(--blue-bd);color:#fff}
#ref-tip{display:none;position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--bd2);border-radius:6px;padding:6px 10px;box-shadow:0 4px 14px rgba(0,0,0,.13);pointer-events:none}
#ref-tip span{display:block;font-size:11px;color:var(--text2);white-space:nowrap;padding:1px 0}
.item-links{padding:8px 10px;border-left:1px solid var(--bd);display:flex;gap:5px;align-items:center;flex-shrink:0}
.lbtn{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:4px 8px;border-radius:4px;text-decoration:none;white-space:nowrap;transition:opacity .12s;border:1px solid}
.lbtn:hover{opacity:.7}
.lb-figma{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.lb-excel{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.ch-tag{font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-bd)}
.cl-wrap{margin-top:1.75rem}
.cl-lbl{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;padding-bottom:.4rem;border-bottom:1px solid var(--bd);margin-bottom:.6rem}
.cl-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--bd);border-radius:7px;overflow:hidden}
.cl-table th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);text-align:left;padding:7px 13px;background:var(--surface2);border-bottom:1px solid var(--bd)}
.cl-table td{padding:8px 13px;border-bottom:1px solid var(--bd);font-size:12px;vertical-align:top}
.cl-table tr:last-child td{border-bottom:none}
.cl-table tr:hover td{background:var(--surface2)}
.cl-mono{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
/* detail panel */
.detail-panel{background:var(--surface);display:flex;flex-direction:column;overflow:hidden;height:100%}
.dp-hdr{padding:13px 15px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:flex-start;gap:8px}
.dp-close{flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 4px;line-height:1;border-radius:3px}
.dp-close:hover{background:var(--surface2);color:var(--text)}
.dp-hdr-right{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0;margin-top:2px}
.dp-fs-ctrl{display:flex;align-items:center;gap:1px}
.dp-fs-btn{background:none;border:1px solid var(--bd);border-radius:3px;cursor:pointer;color:var(--text3);font-size:10px;padding:1px 5px;line-height:1.5;font-family:inherit;transition:all .1s}
.dp-fs-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--bd2)}
.dp-fs-val{font-size:9px;color:var(--text3);width:20px;text-align:center;font-family:'DM Mono',monospace}
.dp-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;flex-shrink:0;margin-top:3px;font-family:'DM Mono',monospace}
.dp-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-top:3px}
.dp-body{padding:13px 15px;flex:1;overflow-y:auto;font-size:var(--dp-fs,12px)}
.tag-check{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-bd);font-weight:500}
.dp-ref{padding:7px 10px;background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:6px;font-size:11px;color:var(--purple);margin-bottom:10px}
.dp-undef{padding:7px 10px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:6px;font-size:11px;color:var(--amber);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dp-review{padding:7px 10px;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:6px;font-size:11px;color:var(--blue);margin-bottom:10px;display:flex;align-items:flex-start;gap:6px}
.dp-prose{font-size:inherit;color:var(--text2);line-height:1.7;margin-bottom:8px}
.dp-detail{margin-bottom:8px}
.dp-para{font-size:inherit;color:var(--text2);line-height:1.7;margin:0 0 7px}.dp-para:last-child{margin-bottom:0}
.dp-list{font-size:inherit;color:var(--text2);line-height:1.7;margin:0 0 7px;padding-left:15px}.dp-list li{margin-bottom:1px}
.dp-quote{font-size:inherit;color:var(--text3);line-height:1.6;margin:0 0 7px;padding:6px 10px;border-left:3px solid var(--bd2);background:var(--surface);border-radius:0 4px 4px 0}
.dp-quote .dp-para{color:var(--text3);margin:0 0 4px}.dp-quote .dp-para:last-child{margin-bottom:0}
.dp-quote .dp-codeblock{margin:4px 0 0;font-size:11px}.dp-quote .dp-list{color:var(--text3)}
.dp-code{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--bd);border-radius:3px;padding:1px 4px;color:var(--text)}
.dp-link{color:var(--blue);text-decoration:none;border-bottom:1px solid var(--blue-bd)}.dp-link:hover{opacity:.75}
.dp-hr{border:none;border-top:1px solid var(--bd);margin:8px 0}
.dp-codeblock{background:var(--surface2);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);overflow-x:auto;margin-bottom:8px;white-space:pre}
.dp-h1{font-size:16px;font-weight:600;color:var(--text);margin:20px 0 6px;padding-bottom:6px;border-bottom:2px solid var(--bd2)}
.dp-h2{font-size:13px;font-weight:600;color:var(--text);margin:14px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--bd)}
.dp-h3{font-size:12px;font-weight:600;color:var(--text);margin:22px 0 6px;padding-top:14px;border-top:1px dashed var(--bd)}
.dp-h3:first-child{margin-top:4px;padding-top:0;border-top:none}
.dp-h4{font-size:11px;font-weight:600;color:var(--text2);margin:14px 0 4px}
.dp-h5,.dp-h6{font-size:11px;font-weight:500;color:var(--text3);margin:4px 0 2px}
del{color:var(--text3)}
.dp-block{margin-bottom:12px}
.md-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.md-overlay.open{display:flex}
.md-box{background:var(--surface);border:1px solid var(--bd);border-radius:10px;width:min(820px,92vw);max-height:86vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.md-box-hdr{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.md-box-title{font-size:13px;font-weight:500;flex:1}
.md-box-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 4px;line-height:1;border-radius:3px}
.md-box-close:hover{background:var(--surface2);color:var(--text)}
.md-body{flex:1;overflow-y:auto;padding:1rem 1.25rem}
.md-doc{font-size:12px;color:var(--text);line-height:1.7}
.md-doc .dp-h1{font-size:18px;margin-top:28px}
.md-doc .dp-h2{font-size:14px;margin-top:20px}
.md-doc .dp-h1:first-child,.md-doc .dp-h2:first-child{margin-top:0}
.dp-blabel{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.dp-blabel::after{content:'';flex:1;height:1px;background:var(--bd)}
.dp-tbl{width:100%;font-size:0.95em;border-collapse:collapse;background:var(--surface);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.dp-tbl th{font-size:0.85em;font-weight:500;color:var(--text3);text-align:left;padding:5px 9px;background:var(--surface2);border-bottom:1px solid var(--bd);white-space:nowrap}
.dp-tbl td{padding:6px 9px;border-bottom:1px solid var(--bd);color:var(--text);vertical-align:top;line-height:1.5}
.dp-tbl tr:last-child td{border-bottom:none}
.dp-tbl tr:hover td{background:var(--surface2)}
.dp-intro{background:var(--surface2);border:1px solid var(--bd);border-left:3px solid var(--bd2);border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--text2);line-height:1.6}
.dp-links{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.dp-link-card{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--surface);border:1px solid var(--bd);border-radius:6px;text-decoration:none;color:var(--text);transition:background .12s,border-color .12s;min-width:0}
.dp-link-card:hover{background:var(--surface2);border-color:var(--bd2)}
.dp-link-type{font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;letter-spacing:.02em}
.dp-link-type.t-figma{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.dp-link-type.t-excel{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.dp-link-type.t-loop{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.dp-link-type.t-other{background:var(--surface2);color:var(--text2);border:1px solid var(--bd2)}
.dp-link-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.dp-link-open{font-size:11px;color:var(--text3);flex-shrink:0;margin-left:4px}
.dp-exc{background:var(--surface2);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:10px}
.dp-exc-hdr{padding:5px 10px;background:var(--coral-bg);border-bottom:1px solid var(--coral-bd);font-size:10px;font-weight:500;color:var(--coral);letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.dp-exc-hdr::before{content:'';width:4px;height:4px;border-radius:50%;background:#D85A30;flex-shrink:0}
.dp-exc-row{display:flex;gap:10px;padding:6px 10px;border-bottom:1px solid var(--bd);font-size:11px}
.dp-exc-row:last-child{border-bottom:none}
.dp-exc-cond{flex:1;color:var(--text2)}
.dp-exc-action{flex:1;color:var(--text)}
.dp-pend{background:var(--surface2);border:1px solid var(--amber-bd);border-radius:6px;overflow:hidden;margin-bottom:10px}
.dp-pend-hdr{padding:5px 10px;background:var(--amber-bg);border-bottom:1px solid var(--amber-bd);font-size:10px;font-weight:500;color:var(--amber);letter-spacing:.04em;text-transform:uppercase}
.dp-pend-row{padding:6px 10px;border-bottom:1px solid var(--bd);font-size:11px;color:var(--text2)}
.dp-pend-row:last-child{border-bottom:none}
.tag-undef{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);font-weight:500}
.dp-empty{display:flex;align-items:center;justify-content:center;flex:1;font-size:12px;color:var(--text3);flex-direction:column;gap:8px;text-align:center}

/* Loading overlay */
#loading{display:none;position:fixed;inset:0;background:var(--bg);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loading.show{display:flex}
.ld-spinner{width:28px;height:28px;border:2px solid var(--bd2);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-msg{font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div id="ref-tip"></div>

<!-- Welcome Screen -->
<div id="welcome">
  <div class="wc-logo">UX <span>Spec Viewer</span></div>
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📄</div>
    <div class="drop-title">기능정의서 MD 파일을 여기에 드롭하거나</div>
    <div class="drop-sub">파일 선택 버튼을 클릭하세요.<br>로컬 파일이 브라우저 내에서 열리며 외부로 전송되지 않습니다.</div>
    <button class="drop-btn" onclick="event.stopPropagation();document.getElementById('file-input').click()">📂 파일 선택</button>
  </div>
  <div class="wc-divider"><span>또는 URL로 불러오기</span></div>
  <div class="url-row">
    <input class="url-input" id="url-input" type="text" placeholder="https://raw.githubusercontent.com/…/spec.md" />
    <button class="url-btn" onclick="loadFromUrlInput()">불러오기</button>
  </div>
  <div class="wc-examples">
    💡 GitHub Raw URL 예시: <code style="font-family:'DM Mono',monospace">https://raw.githubusercontent.com/user/repo/main/spec.md</code>
  </div>
  <div class="wc-err" id="wc-err"></div>
  <input type="file" id="file-input" accept=".md,text/markdown,text/plain" style="display:none" onchange="handleFileSelect(this)">
</div>

<script>
/* ── State ──────────────────────────────────────────────────────── */
let D = null, filter = 'all', activeId = null, panelW = 780;
let LINK_REG = {}, DIST_HISTORY = [];
let CURRENT_MD = '', CURRENT_FILENAME = '';
let SD = {};
const MIN_W = 220, MAX_W = 900;

const SC = {
  "1":["#EEEDFE","#3d2d9e","#9891E0"],"2":["#E3F5EC","#0b6e3a","#5DC991"],
  "3":["#EAF3FC","#0f4f8a","#7BB8EE"],"4":["#FFF0EB","#7a2800","#F0A07A"],
  "5":["#FFF0EB","#7a2800","#F0A07A"],"6":["#FEF3DC","#7a4a00","#E8B84B"],
  "7":["#E3F5EC","#0b6e3a","#5DC991"],"8":["#f2f1ed","#5f5e5a","#d0cec6"]
};

const FI=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5.5A3.5 3.5 0 018.5 2H12v7H8.5A3.5 3.5 0 015 5.5z"/><path d="M12 2h3.5a3.5 3.5 0 110 7H12V2z"/><path d="M12 12.5a3.5 3.5 0 117 0 3.5 3.5 0 01-7 0z"/><path d="M5 19.5A3.5 3.5 0 018.5 16H12v3.5a3.5 3.5 0 01-7 0z"/><path d="M5 12.5A3.5 3.5 0 018.5 9H12v7H8.5A3.5 3.5 0 015 12.5z"/></svg>`;
const EI=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8l8 8M16 8l-8 8"/></svg>`;

/* ── Welcome / File Loading ─────────────────────────────────────── */
function showLoading(msg){ document.getElementById('loading').classList.add('show'); document.getElementById('ld-msg').textContent = msg||'불러오는 중…'; }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }

function openWelcome(){
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('viewer').style.display = 'none';
  document.getElementById('wc-err').textContent = '';
}

function handleFileSelect(input){
  const file = input.files[0];
  if(!file) return;
  input.value = '';
  showLoading(file.name + ' 파싱 중…');
  const reader = new FileReader();
  reader.onload = e => {
    processMarkdown(e.target.result, file.name);
  };
  reader.onerror = () => { hideLoading(); setWcErr('파일을 읽을 수 없습니다.'); };
  reader.readAsText(file, 'utf-8');
}

async function loadFromUrlInput(){
  const raw = document.getElementById('url-input').value.trim();
  if(!raw){ setWcErr('URL을 입력해 주세요.'); return; }
  await loadFromUrl(raw);
}

async function loadFromUrl(url){
  showLoading('URL에서 불러오는 중…');
  setWcErr('');
  try{
    const r = await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const txt = await r.text();
    const filename = url.split('/').pop().split('?')[0] || 'spec.md';
    processMarkdown(txt, filename);
  } catch(e){
    hideLoading();
    setWcErr('불러오기 실패: ' + e.message + '. CORS 정책으로 차단된 URL일 수 있습니다.');
  }
}

function setWcErr(msg){ document.getElementById('wc-err').textContent = msg; }

function processMarkdown(txt, filename){
  try{
    CURRENT_MD = txt;
    CURRENT_FILENAME = filename;
    SD = {};
    DIST_HISTORY = [];
    LINK_REG = {};
    activeId = null;

    const meta = parseDocMeta(txt);
    D = {
      project: meta['프로젝트'] || meta['project'] || filename.replace(/\.md$/i,''),
      version: meta['버전'] || meta['version'] || '',
      updated_at: meta['작성일'] || meta['updated_at'] || '',
      author: meta['작성자'] || meta['author'] || '',
      sections: []
    };

    parseDistHistory(txt);
    parseLinkReg(txt);
    const parsed = parseMD(txt);
    Object.assign(SD, parsed);
    D.sections = buildSectionsFromMD(txt);

    hideLoading();
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('viewer').style.display = '';
    render();
    closeDetail();
  } catch(e){
    hideLoading();
    setWcErr('파싱 오류: ' + e.message);
  }
}

/* ── Drag and Drop ──────────────────────────────────────────────── */
(function initDrop(){
  const zone = document.getElementById('drop-zone');
  ['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.add('drag-over'); }));
  ['dragleave','drop'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.remove('drag-over'); }));
  zone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if(!file) return;
    showLoading(file.name + ' 파싱 중…');
    const reader = new FileReader();
    reader.onload = ev => processMarkdown(ev.target.result, file.name);
    reader.onerror = () => { hideLoading(); setWcErr('파일을 읽을 수 없습니다.'); };
    reader.readAsText(file, 'utf-8');
  });
  // Also allow global drop (anywhere on welcome screen)
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    if(document.getElementById('welcome').classList.contains('hidden')) return;
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if(!file) return;
    showLoading(file.name + ' 파싱 중…');
    const reader = new FileReader();
    reader.onload = ev => processMarkdown(ev.target.result, file.name);
    reader.onerror = () => { hideLoading(); setWcErr('파일을 읽을 수 없습니다.'); };
    reader.readAsText(file, 'utf-8');
  });
})();

/* ── URL query param auto-load ──────────────────────────────────── */
(function checkQueryParam(){
  const p = new URLSearchParams(location.search);
  const u = p.get('url') || p.get('spec');
  if(u) loadFromUrl(u);
})();

/* ── Resizer ────────────────────────────────────────────────────── */
function setPanelWidth(w){ panelW=Math.max(MIN_W,Math.min(MAX_W,w)); document.getElementById('ca').style.setProperty('--panel-w', panelW+'px'); }
(function initResizer(){
  const resizer = document.getElementById('resizer');
  let startX, startW;
  resizer.addEventListener('mousedown', e => {
    startX=e.clientX; startW=panelW;
    resizer.classList.add('dragging');
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
    const ca = document.getElementById('ca'); ca.style.transition='none';
    const onMove = e => { setPanelWidth(startW+(startX-e.clientX)); };
    const onUp = () => { resizer.classList.remove('dragging'); document.body.style.cursor=''; document.body.style.userSelect=''; ca.style.transition=''; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    e.preventDefault();
  });
})();

/* ── MD Parsers ─────────────────────────────────────────────────── */
function mdInline(s){
  if(!s) return '';
  return s.replace(/\\([-*_~`\[\]()#!|])/g,'$1')
    .replace(/&(?!amp;|lt;|gt;|quot;|apos;|#\d+;|#x[\da-f]+;)/gi,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/\*([^*\s][^*]*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code class="dp-code">$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" class="dp-link">$1</a>')
    .replace(/\[확인 필요\]/g,'<span class="tag-check">확인 필요</span>')
    .replace(/@@\{([^}]+)\}/g,(_,n)=>{const e=LINK_REG[n.trim()];return e&&e.url?`<a href="${e.url}" target="_blank" rel="noopener" class="dp-link">${n.trim()}</a>`:`<span class="tag-check">${n.trim()}</span>`;});
}

function parseTblLines(lines){
  const tl=lines.filter(l=>l.trim().startsWith('|'));
  if(tl.length<3) return null;
  const cells=l=>l.split('|').slice(1,-1).map(c=>c.trim());
  const h=cells(tl[0]);
  const r=tl.slice(2).map(cells);
  return h.some(Boolean)?{h,r}:null;
}

function parseHtmlTable(html){
  try{
    const doc=new DOMParser().parseFromString(html,'text/html');
    const table=doc.querySelector('table');
    if(!table) return null;
    const h=[],r=[];
    table.querySelectorAll('tr').forEach(tr=>{
      const ths=tr.querySelectorAll('th'),tds=tr.querySelectorAll('td');
      if(ths.length) ths.forEach(th=>h.push(th.textContent.trim()));
      else if(tds.length) r.push(Array.from(tds).map(td=>td.textContent.trim()));
    });
    return (h.length||r.length)?{h,r}:null;
  }catch(e){return null;}
}

function mdBlock(md){
  if(!md) return '';
  const lines=md.split('\n'); let html='',i=0;
  while(i<lines.length){
    const l=lines[i].trimEnd(), tr=l.trim();
    if(!tr){i++;continue;}
    if(tr.startsWith('@@')&&!tr.startsWith('@@{')){
      const name=tr.slice(2).trim(), e=LINK_REG[name]||LINK_REG[name.replace(/\s+/g,'')];
      if(e&&e.url){const tc=e.type.toLowerCase().includes('figma')?'t-figma':e.type.toLowerCase().includes('excel')?'t-excel':e.type.toLowerCase().includes('loop')?'t-loop':'t-other';html+=`<div class="dp-links"><a href="${e.url}" target="_blank" rel="noopener" class="dp-link-card"><span class="dp-link-type ${tc}">${e.type||'링크'}</span><span class="dp-link-name">${name}</span><span class="dp-link-open">↗</span></a></div>`;}
      else{html+=`<p class="dp-para"><span class="tag-check">${name}</span><span style="color:var(--text3);font-size:11px;margin-left:5px">(URL 미등록)</span></p>`;}
      i++;continue;
    }
    if(/^<table/.test(tr)){
      let tableHtml='';
      while(i<lines.length){tableHtml+=lines[i]+'\n';if(lines[i].includes('</table>')){i++;break;}i++;}
      const t=parseHtmlTable(tableHtml);
      if(t&&(t.h.length||t.r.length)){const hdrs=t.h.map(h=>`<th>${mdInline(h)}</th>`).join('');const rows=t.r.map(row=>`<tr>${row.map(c=>`<td>${c==='미정의'?'<span class="tag-undef">미정의</span>':mdInline(c)}</td>`).join('')}</tr>`).join('');html+=`<div class="dp-block"><table class="dp-tbl"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table></div>`;}
      continue;
    }
    if(/^```/.test(tr)){
      const lang=tr.slice(3).trim(); let code='';i++;
      while(i<lines.length&&!/^```\s*$/.test(lines[i].trim())){code+=lines[i]+'\n';i++;}
      if(i<lines.length) i++;
      html+=`<pre class="dp-codeblock"><code${lang?` class="language-${lang}"`:''}>` +code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+`</code></pre>`;
      continue;
    }
    if(/^(-{3,}|\*{3,}|_{3,})$/.test(tr)){html+=`<hr class="dp-hr">`;i++;continue;}
    const hm=tr.match(/^(#{1,6})\s+(.+)/);
    if(hm){html+=`<div class="dp-h${hm[1].length}">${mdInline(hm[2])}</div>`;i++;continue;}
    if(tr.startsWith('|')&&i+1<lines.length&&/^\|[\s\-:|]+\|/.test(lines[i+1].trim())){
      const tblLines=[lines[i++],lines[i++]];
      while(i<lines.length&&lines[i].trim().startsWith('|')) tblLines.push(lines[i++]);
      const t=parseTblLines(tblLines);
      if(t){const hdrs=t.h.map(h=>`<th>${mdInline(h)}</th>`).join('');const rows=t.r.map(row=>`<tr>${row.map(c=>`<td>${c==='미정의'?'<span class="tag-undef">미정의</span>':mdInline(c)}</td>`).join('')}</tr>`).join('');html+=`<div class="dp-block"><table class="dp-tbl"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table></div>`;}
      continue;
    }
    if(/^\*\*[^*\n]+\*\*\s*$/.test(tr)){
      const label=tr.replace(/^\*\*|\*\*$/g,'');
      let j=i+1;while(j<lines.length&&!lines[j].trim()) j++;
      const isLabel=j<lines.length&&lines[j].trim().startsWith('|')&&j+1<lines.length&&/^\|[\s\-:|]+\|/.test(lines[j+1].trim());
      html+=isLabel?`<div class="dp-blabel">${mdInline(label)}</div>`:`<p class="dp-para"><strong>${mdInline(label)}</strong></p>`;
      i++;continue;
    }
    if(/^>/.test(l)){
      const bqLines=[];
      while(i<lines.length&&/^>/.test(lines[i])){bqLines.push(lines[i].replace(/^>\s?/,''));i++;}
      html+=`<div class="dp-quote">${mdBlock(bqLines.join('\n'))}</div>`;continue;
    }
    if(/^[-*+] /.test(tr)&&!/^\s/.test(l)){
      html+='<ul class="dp-list">';
      while(i<lines.length&&/^[-*+] /.test(lines[i].trim())&&!/^\s/.test(lines[i])){
        const content=lines[i].replace(/^[-*+] /,'');i++;
        let sub='';
        if(i<lines.length&&/^\s{2,}[-*+] /.test(lines[i])){sub='<ul class="dp-list">';while(i<lines.length&&/^\s{2,}[-*+] /.test(lines[i])){sub+=`<li>${mdInline(lines[i].replace(/^\s+[-*+] /,''))}</li>`;i++;}sub+='</ul>';}
        html+=`<li>${mdInline(content)}${sub}</li>`;
      }
      html+='</ul>';continue;
    }
    if(/^\d+[.)]\s/.test(tr)&&!/^\s/.test(l)){
      html+='<ol class="dp-list">';
      while(i<lines.length&&/^\d+[.)]\s/.test(lines[i].trim())&&!/^\s/.test(lines[i])){
        const content=lines[i].replace(/^\d+[.)]\s/,'');i++;
        let sub='';
        if(i<lines.length&&/^\s{2,}\d+[.)]\s/.test(lines[i])){sub='<ol class="dp-list">';while(i<lines.length&&/^\s{2,}\d+[.)]\s/.test(lines[i])){sub+=`<li>${mdInline(lines[i].replace(/^\s+\d+[.)]\s/,''))}</li>`;i++;}sub+='</ol>';}
        html+=`<li>${mdInline(content)}${sub}</li>`;
      }
      html+='</ol>';continue;
    }
    const si=i; let para='';
    while(i<lines.length){
      const c=lines[i].trimEnd(),ct=c.trim();
      if(!ct||/^>/.test(c)||/^[-*+] /.test(ct)||/^\d+[.)]\s/.test(ct)||ct.startsWith('|')||ct.startsWith('<table')||/^\*\*[^*\n]+\*\*\s*$/.test(ct)||/^#{1,}/.test(ct)||/^```/.test(ct)||/^(-{3,}|\*{3,}|_{3,})$/.test(ct)) break;
      para+=(para?' ':'')+c;i++;
    }
    if(para) html+=`<p class="dp-para">${mdInline(para)}</p>`;
    else if(i===si) i++;
  }
  return html||`<p class="dp-para">${mdInline(md)}</p>`;
}

function parseDocMeta(md){
  const meta={};
  const firstSec=md.search(/^#\s+\d+\./m);
  const header=firstSec>=0?md.slice(0,firstSec):md;
  for(const line of header.split('\n')){
    const m=line.match(/^>\s*(.+?):\s*(.+?)\s*$/);
    if(m) meta[m[1].trim()]=m[2].trim();
  }
  return meta;
}

function parseDistHistory(md){
  DIST_HISTORY=[];
  const start=md.search(/^#\s+00\.\s+/m);
  if(start<0) return;
  let body=md.slice(md.indexOf('\n',start)+1);
  const next=body.search(/^#\s+\d+\./m);
  if(next>=0) body=body.slice(0,next);
  const t=parseTblLines(body.split('\n'));
  if(!t) return;
  const vi=t.h.findIndex(h=>/버전/.test(h));
  const di=t.h.findIndex(h=>/일시/.test(h));
  const ai=t.h.findIndex(h=>/담당자/.test(h));
  const ni=t.h.findIndex(h=>/내용/.test(h));
  t.r.forEach(row=>{
    const ver=vi>=0?(row[vi]||'').trim():'';
    const date=di>=0?(row[di]||'').trim():'';
    const author=ai>=0?(row[ai]||'').trim():'';
    const note=ni>=0?(row[ni]||'').trim():'';
    if(ver||date) DIST_HISTORY.push({ver,date,author,note});
  });
}

function parseLinkReg(md){
  LINK_REG={};
  const start=md.search(/^#\s+99\.\s+링크관리/m);
  if(start<0) return;
  let body=md.slice(md.indexOf('\n',start)+1);
  const next=body.search(/^#\s+\d+\./m);
  if(next>=0) body=body.slice(0,next);
  const t=parseTblLines(body.split('\n'));
  if(!t) return;
  const fi=t.h.findIndex(h=>/파일명/.test(h));
  const ti=t.h.findIndex(h=>/링크유형|유형/.test(h));
  const ui=t.h.findIndex(h=>/URL/i.test(h));
  if(fi<0||ui<0) return;
  t.r.forEach(row=>{
    const name=(row[fi]||'').trim();
    const type=ti>=0?(row[ti]||'').trim():'';
    const url=(row[ui]||'').replace(/\\_/g,'_').trim();
    if(name){LINK_REG[name]={type,url};LINK_REG[name.replace(/\s+/g,'')]={type,url};}
  });
}

function parseMD(md){
  const out={};
  const mdLines=md.split('\n');
  const parentIntros={};
  let pSec=null,pIntroLines=[];
  for(const line of mdLines){
    const sm=line.match(/^#\s+(\d+)\./);
    if(sm){if(pSec&&pIntroLines.some(l=>l.trim())) parentIntros[pSec]=pIntroLines.join('\n').trim();pSec=sm[1];pIntroLines=[];continue;}
    if(pSec&&/^##\s+\d+\./.test(line)){if(pIntroLines.some(l=>l.trim())) parentIntros[pSec]=pIntroLines.join('\n').trim();pSec=null;pIntroLines=[];continue;}
    if(pSec) pIntroLines.push(line);
  }
  if(pSec&&pIntroLines.some(l=>l.trim())) parentIntros[pSec]=pIntroLines.join('\n').trim();

  const chunks=md.split(/\n(?=#{1,2}\s+\d+\.)/);
  chunks.forEach(chunk=>{
    const m=chunk.match(/^#{1,2}\s+([\d]+\.[\d]+)\s+(.+?)(?:\s+\[.*?\])?(?:\n|$)/);
    if(!m) return;
    const order=m[1]; const obj={};
    {const pn=order.split('.')[0];if(parentIntros[pn]) obj.intro=parentIntros[pn];}
    const refM=chunk.match(/^→\s+섹션\s+[\d.]+\s+(.+?)(?:\.|$)/m)||chunk.match(/^→\s+(.+참조.+?)(?:\n|$)/m);
    if(refM) obj.ref=refM[1].trim();
    if(/미정의\s*—|>\s*미정의/.test(chunk)){const um=chunk.match(/미정의\s*—\s*(.+?)(?:\n|$)/);obj.undef=um?um[1].trim():'내용 확인 필요';}
    const rvM=chunk.match(/\\?\[검토 필요\\?\]\*{0,2}\s*(.+?)(?:\n|$)/);
    if(rvM) obj.review=rvM[1].replace(/^\*\*|\*\*$/g,'').trim();
    const detailM=chunk.match(/###\s*기능\s*상세\s*\n([\s\S]*?)(?=\n###\s*예외처리|\n#{1,2}\s|$)/);
    if(detailM&&detailM[1].trim()) obj.detailMd=detailM[1].trim();
    if(!obj.detailMd){
      const bodyM=chunk.match(/^#{1,2}\s+[\d.]+[^\n]*\n([\s\S]*)$/);
      if(bodyM){let body=bodyM[1];if(obj.exc) body=body.replace(/###\s*예외처리[\s\S]*$/,'');body=body.trim();if(body) obj.detailMd=body;}
    }
    const excM=chunk.match(/###\s*예외처리\s*\n([\s\S]*?)(?=\n###|\n#{1,4}\s|$)/);
    if(excM){const t=parseTblLines(excM[1].split('\n'));if(t&&t.r.length) obj.exc=t.r.map(r=>[r[0]||'',r[1]||'']);}
    const rawRefs=[...chunk.matchAll(/^@@(.+?)$/gm)].map(m=>m[1].trim());
    if(rawRefs.length) obj.refs=[...new Set(rawRefs)];
    if(Object.keys(obj).length) out[order]=obj;
  });
  return out;
}

function buildSectionsFromMD(md){
  const sections=[]; let cur=null;
  for(const raw of md.split('\n')){
    const l=raw.trim();
    const secM=l.match(/^#\s+(\d+)\.\s+(.+)/);
    if(secM){cur={id:secM[1],title:`${secM[1]}. ${secM[2].trim()}`,items:[]};sections.push(cur);continue;}
    const itM=l.match(/^##\s+(\d+\.\d+)\s+(.+?)(?:\s+\\?\[.*?\\?\])?$/);
    if(itM&&cur&&itM[1].split('.')[0]===cur.id){
      const order=itM[1],name=itM[2].replace(/\\\[|\\\]/g,'').trim();
      const idx=String(cur.items.length+1).padStart(3,'0');
      cur.items.push({id:`SCR-${cur.id}-${idx}`,order,name,recently_changed:false,figma_url:null,excel_url:null,pending_items:[]});
    }
  }
  return sections.filter(s=>s.id!=='99'&&s.id!=='00');
}

/* ── Render ─────────────────────────────────────────────────────── */
function setFilter(f,btn){ filter=f; document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); render(); }
function filterItem(it){ if(filter==='changed') return it.recently_changed; return true; }

function tbl(t){
  const hdrs=t.h.map(h=>`<th>${mdInline(h)}</th>`).join('');
  const rows=t.r.map(row=>`<tr>${row.map(c=>`<td>${c==='미정의'?'<span class="tag-undef">미정의</span>':mdInline(c)}</td>`).join('')}</tr>`).join('');
  return `<div class="dp-block">${t.t?`<div class="dp-blabel">${t.t}</div>`:''}<table class="dp-tbl"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function render(){
  if(!D) return;
  document.title = (D.project||'UX Spec') + ' — Spec Viewer';
  document.getElementById('sb-name').textContent = D.project || 'Spec Viewer';
  const verStr=[D.version,D.updated_at].filter(Boolean).join(' · ');
  document.getElementById('sb-updated').textContent = verStr||'—';
  if(D.author) document.getElementById('sb-author').textContent = D.author;
  document.getElementById('spec-status').textContent = CURRENT_FILENAME;

  let total=0, changed=0;
  D.sections.forEach(s=>s.items.forEach(it=>{total++;if(it.recently_changed)changed++;}));
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-changed').textContent=changed;

  const nav=document.getElementById('sb-nav');
  nav.innerHTML='';
  D.sections.forEach(s=>{
    const hc=s.items.some(it=>it.recently_changed);
    const vi=s.items.filter(it=>filterItem(it));
    if(!vi.length&&filter!=='all') return;
    const d=document.createElement('div');
    d.className=`sb-sec${hc?' hl':''}${!s.items.length?' sb-sec-empty':''}`;
    d.innerHTML=`<span class="sb-dot ${hc?'d-ch':s.items.length?'d-g':'d-empty'}"></span><span>${s.title}</span>`;
    d.onclick=()=>{const el=document.getElementById('sec-'+s.id);if(el)el.scrollIntoView({behavior:'smooth'});};
    nav.appendChild(d);
  });
  const cl=document.createElement('div');
  cl.className='sb-cl';cl.innerHTML=`<span class="sb-dot d-log"></span><span>배포이력</span>`;
  cl.onclick=()=>document.getElementById('dist-history').scrollIntoView({behavior:'smooth'});
  nav.appendChild(cl);

  const content=document.getElementById('main-content');
  content.innerHTML='';
  D.sections.forEach(s=>{
    const vi=s.items.filter(it=>filterItem(it));
    if(!vi.length&&filter!=='all') return;
    const block=document.createElement('div');
    block.className='sec-block'; block.id='sec-'+s.id;
    block.innerHTML=`<div class="sec-hd"><span class="sec-title">${s.title}</span></div>`;
    if(!vi.length){
      const ph=document.createElement('div');
      ph.style.cssText='padding:14px 16px;font-size:12px;color:var(--text3);font-style:italic';
      ph.textContent='항목 준비 중';
      block.appendChild(ph); content.appendChild(block); return;
    }
    vi.forEach(it=>{
      const sp=SD[it.order];
      const refs=sp?.refs||[];
      const refIcon=refs.length?`<span class="item-ref-icon" data-refs="${refs.join('|')}" onclick="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M6.5 3.5H9.5C11.433 3.5 13 5.067 13 7C13 8.933 11.433 10.5 9.5 10.5H8M9.5 12.5H6.5C4.567 12.5 3 10.933 3 9C3 7.067 4.567 5.5 6.5 5.5H8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>${refs.length>1?refs.length:''}</span>`:'';
      const dot=`<span class="item-dot ${it.recently_changed?'item-dot-ch':'item-dot-g'}"></span>`;
      const ct=it.recently_changed?`<span class="ch-tag">변경됨</span>`:'';
      const rn=it.ref?`<div class="item-sub">→ ${it.ref} 참조</div>`:'';
      const fb=it.figma_url?`<a class="lbtn lb-figma" href="${it.figma_url}" target="_blank" onclick="event.stopPropagation()">${FI} Figma</a>`:'';
      const eb=it.excel_url?`<a class="lbtn lb-excel" href="${it.excel_url}" target="_blank" onclick="event.stopPropagation()">${EI} Excel</a>`:'';
      const hl=it.figma_url||it.excel_url;
      const card=document.createElement('div');
      card.className='item-row'; card.id='ir-'+it.id;
      card.onclick=()=>openDetail(it,s.id);
      card.innerHTML=`<div class="item-main"><div class="item-name-cell"><div class="item-name">${dot}<span class="item-order">${it.order}</span>${it.name}${ct}</div>${rn}</div><div class="item-id-cell">${refIcon}<span class="item-id-badge">${it.id}</span></div>${hl?`<div class="item-links">${fb}${eb}</div>`:''}</div>`;
      block.appendChild(card);
    });
    content.appendChild(block);
  });

  const distRows=DIST_HISTORY.map(r=>`<tr><td class="cl-mono">${r.ver||'—'}</td><td class="cl-mono">${r.date||'—'}</td><td style="color:var(--text2)">${r.author||'—'}</td><td style="color:var(--text2)">${r.note||''}</td></tr>`).join('');
  document.getElementById('dist-body').innerHTML=distRows||`<tr><td colspan="4" style="color:var(--text3);font-size:11px;font-style:italic">배포이력 없음</td></tr>`;
}

/* ── Detail Panel ───────────────────────────────────────────────── */
let dpFs=12;
function adjDpFs(delta){ dpFs=Math.min(18,Math.max(10,dpFs+delta)); const dp=document.getElementById('dp'); dp.style.setProperty('--dp-fs',dpFs+'px'); const el=document.getElementById('dp-fs-val');if(el) el.textContent=dpFs; }
function closeDetail(){ activeId=null; document.getElementById('ca').classList.remove('panel-open'); document.getElementById('dp').innerHTML=`<div class="dp-empty"><div style="font-size:22px;opacity:.25">☰</div><div>항목을 클릭하면<br>기능정의가 표시됩니다</div></div>`; document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('active')); }

function openDetail(it,sid){
  if(activeId===it.id){closeDetail();return;}
  activeId=it.id;
  document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('active'));
  const el=document.getElementById('ir-'+it.id);
  if(el) el.classList.add('active');
  document.getElementById('ca').classList.add('panel-open');
  const sc=SC[sid]||SC["8"];
  const sp=SD[it.order]||null;
  let h=`<div class="dp-hdr"><div style="flex:1;min-width:0"><span class="dp-badge" style="background:${sc[0]};color:${sc[1]};border:1px solid ${sc[2]}">${it.order}</span><div class="dp-title">${it.name}</div></div><div class="dp-hdr-right"><div class="dp-fs-ctrl"><button class="dp-fs-btn" onclick="adjDpFs(-1)">A−</button><span class="dp-fs-val" id="dp-fs-val">${dpFs}</span><button class="dp-fs-btn" onclick="adjDpFs(1)">A+</button></div><button class="dp-close" onclick="closeDetail()">×</button></div></div><div class="dp-body">`;
  if(!sp){h+=`<div style="font-size:12px;color:var(--text3)">기능정의서 내용이 없습니다.</div>`;}
  else{
    if(sp.intro) h+=`<div class="dp-intro">${mdBlock(sp.intro)}</div>`;
    if(sp.ref) h+=`<div class="dp-ref">→ ${sp.ref}</div>`;
    if(sp.undef) h+=`<div class="dp-undef"><span class="tag-undef">미정의</span><span style="margin-left:6px">${sp.undef}</span></div>`;
    if(sp.detailMd) h+=`<div class="dp-detail">${mdBlock(sp.detailMd)}</div>`;
    else{if(sp.prose) h+=`<div class="dp-prose">${mdBlock(sp.prose)}</div>`;if(sp.tables) sp.tables.forEach(t=>{h+=tbl(t);});}
    if(sp.review) h+=`<div class="dp-review"><span class="tag-undef" style="background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)">검토 필요</span><span style="margin-left:6px">${mdInline(sp.review)}</span></div>`;
    if(sp.exc){h+=`<div class="dp-exc"><div class="dp-exc-hdr">예외처리</div>${sp.exc.map(([c,a])=>`<div class="dp-exc-row"><div class="dp-exc-cond">${mdInline(c)}</div><div class="dp-exc-action">${a==='미정의'?'<span class="tag-undef">미정의</span>':mdInline(a)}</div></div>`).join('')}</div>`;}
  }
  if((it.pending_items||[]).length>0){h+=`<div class="dp-pend"><div class="dp-pend-hdr">정의 필요</div>${it.pending_items.map(p=>`<div class="dp-pend-row">${p}</div>`).join('')}</div>`;}
  h+=`</div>`;
  const dpEl=document.getElementById('dp');
  dpEl.innerHTML=h; dpEl.style.setProperty('--dp-fs',dpFs+'px');
}

/* ── Export ─────────────────────────────────────────────────────── */
function exportMD(){
  if(!CURRENT_MD) return;
  const blob=new Blob([CURRENT_MD],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=CURRENT_FILENAME||'spec.md'; a.click(); URL.revokeObjectURL(a.href);
}

function exportTOC(){
  if(!D||!D.sections||!D.sections.length) return;
  const today=new Date().toISOString().slice(0,10);
  let md=`# ${D.project||'Spec'} 기능 정의서 목차\n\n`;
  md+=`> 버전: ${D.version||'—'} | 업데이트: ${D.updated_at||'—'} | 목차 생성: ${today}\n\n---\n\n`;
  for(const sec of D.sections){
    md+=`## ${sec.title}\n\n`;
    for(const it of sec.items) md+=`- **${it.order}** ${it.name}\n`;
    md+='\n';
  }
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`${D.project||'spec'}_목차_${today}.md`; a.click(); URL.revokeObjectURL(a.href);
}

/* ── MD Full View Modal ─────────────────────────────────────────── */
function openMdViewer(){
  document.getElementById('md-overlay').classList.add('open');
  document.getElementById('md-raw-content').innerHTML=mdBlock(CURRENT_MD)||'<p style="color:var(--text3)">내용 없음</p>';
}
function closeMdViewer(){ document.getElementById('md-overlay').classList.remove('open'); }

/* ── Tooltip ────────────────────────────────────────────────────── */
(function(){
  const tt=document.getElementById('ref-tip');
  document.addEventListener('mouseover',e=>{
    const icon=e.target.closest('.item-ref-icon');
    if(!icon||!icon.dataset.refs) return;
    const refs=icon.dataset.refs.split('|').filter(Boolean);
    tt.innerHTML=refs.map(n=>`<span>${n}</span>`).join('');
    tt.style.display='block';
    const r=icon.getBoundingClientRect(),tw=tt.offsetWidth;
    const left=Math.max(4,Math.min(r.right-tw,window.innerWidth-tw-4));
    tt.style.left=left+'px'; tt.style.top=(r.bottom+5)+'px';
  });
  document.addEventListener('mouseout',e=>{
    if(e.target.closest('.item-ref-icon')&&!e.relatedTarget?.closest('.item-ref-icon')) tt.style.display='none';
  });
})();

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeMdViewer(); });
</script>
